<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/styles.css">

    <title>🪐El Tiempo en tu Planeta🪐</title>

</head>

<body>

    <div class="container mt-4">

        <!-- HEADER -->
        <header class="mb-4">

            <nav class="navbar navbar-expand-lg rounded">

                <div class="container-fluid">

                    <div class="d-flex flex-wrap justify-content-between align-items-center w-100">

                        <!-- titular -->
                        <a class="navbar-brand fw-bold text-center mb-2 text-white btn" href="index.html">
                            🪐El Tiempo en tu Planeta🪐
                        </a>

                        <!-- menu -->
                        <div class="navbar-nav d-flex flex-row flex-wrap">

                            <a class="mb-2 nav-link text-white btn"
                                href="index.html">
                                Volver      
                            </a>

                        </div>

                    </div>

                </div>

            </nav>

        </header>


        <!-- el main -->
        <main>

            <section>

                <div>

                    <div id="img_planeta"></div>
                    <p class="text-end small">FUENTE: Nasa</p>

                    <div class="card-body">
                        <div id="detalle_planeta"></div>
                    </div>

                </div>

                <!-- aqui van las cards -->
                <div
                    id="contenedor_tiempo_semanal"
                    class="row row-cols-1 row-cols-md-3 row-cols-lg-5 g-4 mt-3">

                </div>

            </section>


            <!-- aside -->
            <aside class="p-4 rounded shadow-sm mt-5">

                <h5 class="text-center">
                    *Planetas enanos
                </h5>

                <h3 class="text-danger mt-3">
                    Más información:
                </h3>

                <p>
                    Conoce más sobre tus planetas favoritos en
                    <a
                        href="https://science.nasa.gov/solar-system/planets/"
                        target="_blank"
                        rel="noopener noreferrer">
                        este enlace
                    </a>
                </p>

                <a
                    href="https://science.nasa.gov/solar-system/planets/"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="d-block text-center">
                    <img
                        class="img-fluid"
                        width="60"
                        alt="NASA Logo"
                        src="https://science.nasa.gov/wp-content/themes/nasa-child/assets/images/nasa-logo.svg">
                </a>
            </aside>
        </main>

        <!-- footer -->
        <footer class="text-white text-center p-3 mt-5 rounded">

            <div class="row">

                <div class="col-sm-12 mb-3">

                    <button
                        class="btn btn-light"
                        onclick="window.scrollTo({
                            top:0,
                            behavior:'smooth'
                        })">
                        Volver arriba
                    </button>

                </div>

            </div>

            <p class="mb-0">
                DERECHOS RESERVADOS 2026
                <br>
                CREADO POR BERNOULLI314
            </p>

        </footer>

    </div>

    <!-- bootstrap script js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- mi script -->
    <script src="./assets/js/datos.js"></script>
    <script src="./assets/js/detalle.js"></script>

</body>

</html>
